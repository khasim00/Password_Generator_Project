<!DOCTYPE html>
<html lang="en">
<head>
<title>Password Generator - LearnCodeEasy</title>
<link rel="stylesheet" href="./assets/style.css">
</head>
<body>
<div class="password-box">
<h2>Password generator</h2>
<div class="input-box">
<input type="text" id="password" readonly placeholder="Your Password">
<button id="copy">copy</button>
</div>
<div class="length-box">
<label> Password Length : <span id="lengthValue">12</span></label>
<input type="range" min="6" max="20" value="12" id="length">
</div>
<button class="generate-btn" id="generate">Generate Password</button>
</div>

<script src="./assets/script.js"></script>
</body>
</html>
